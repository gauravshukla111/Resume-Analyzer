<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Analyzer Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
  background: radial-gradient(circle at top, #111 0%, #000 100%);
}

.glass{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);}

.glow:hover{
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

.progress-bar{
  transition: width 1s ease;
}
</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-3xl space-y-6">

<h1 class="text-4xl font-bold text-center">Resume Analyzer</h1>

<!-- upload resume -->
<div class="glass p-6 rounded-xl text-center glow">

<input type="file" id="resume" accept="application/pdf" class="mb-3">
<p id="status">Upload Resume</p>

</div>


<input id="jobRole"
class="w-full p-3 rounded-xl glass"
placeholder="Enter job role (e.g. Frontend Developer)">

<button onclick="analyzeResume()"
class="w-full p-3 rounded-xl bg-white text-black font-semibold hover:scale-105 transition">
Analyze Resume
</button>


<div id="loading" class="hidden text-center">Analyzing...</div>


<div id="result" class="hidden space-y-5">


<div class="glass p-5 rounded-xl">
<p>Match Score</p>
<div class="w-full bg-gray-800 h-3 rounded mt-2">
<div id="progress" class="progress-bar h-3 bg-white rounded" style="width:0%"></div>
</div>
<p id="scoreText" class="mt-2"></p>
</div>

<!-- skills section -->
<div class="glass p-5 rounded-xl">
<p class="font-semibold">Extracted Skills</p>
<div id="skills" class="flex flex-wrap gap-2 mt-2"></div>
</div>

<!-- missing -->

<div class="glass p-5 rounded-xl">
<p class="font-semibold">Missing Skills</p>
<div id="missing" class="flex flex-wrap gap-2 mt-2"></div>

</div>


<div class="glass p-5 rounded-xl">
<p class="font-semibold">Suggestions</p>
<ul id="suggestions" class="list-disc ml-5 mt-2 space-y-1"></ul>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
