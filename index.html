<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-4xl p-6">

  <h1 class="text-3xl font-bold text-center mb-6 tracking-wide">
    AI Resume Analyzer
  </h1>

  <!-- upload resume -->
  <div id="dropZone"
    class="border border-gray-700 p-10 rounded-xl text-center cursor-pointer 
    hover:bg-white hover:text-black transition-all duration-300">

    <p>Drag & Drop Resume (PDF)</p>
    <input type="file" id="fileInput" class="hidden" accept="application/pdf"/>
  </div>

  <!-- role -->
  <input id="jobRole"
    placeholder="Enter role (e.g. frontend developer)"
    class="mt-6 w-full p-3 bg-black border border-gray-700 rounded outline-none focus:border-white"/>

  <!-- button -->
  <button id="analyzeBtn"
    class="mt-4 w-full border border-white p-3 rounded hover:bg-white hover:text-black transition">
    Analyze Resume
  </button>

  <!-- result -->
  <div id="result" class="hidden mt-6 space-y-6">

    <!-- progress show-->
    <div>
      <p class="mb-2">Match Score</p>
      <div class="w-full bg-gray-800 h-3 rounded">
        <div id="progressBar" class="h-3 bg-white rounded w-0 transition-all duration-700"></div>
      </div>
      <p id="score" class="mt-2 text-xl"></p>
    </div>

    <!-- missing data section-->
    <div>
      <h2 class="mb-2">Missing Skills</h2>
      <ul id="missing" class="text-gray-400"></ul>
    </div>

    <div>
      <h2 class="mb-2">Suggestions</h2>
      <ul id="suggestions" class="text-gray-400"></ul>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
